name: Auto Build & Release KAMEL PRO

on:
  push:
    branches: [ main ]
    paths:
      - 'pubspec.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Remove old Android folder
        run: rm -rf android
      
      - name: Recreate Android folder
        run: flutter create --org com.kamelpro --project-name kamel_pro --platforms=android .
          
      - name: Set SDK 36
        run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 36/g' android/app/build.gradle
          
      - name: Get dependencies
        run: flutter pub get
      
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f2)
          VERSION_NAME=$(echo $VERSION | cut -d '+' -f1)
          VERSION_CODE=$(echo $VERSION | cut -d '+' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(sha256sum build/app/outputs/flutter-apk/app-release.apk | cut -d ' ' -f1)
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT
      
      - name: Update version.json
        run: |
          cat > version.json << EOF
          {
            "versionCode": ${{ steps.version.outputs.VERSION_CODE }},
            "versionName": "${{ steps.version.outputs.VERSION_NAME }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/app-release.apk",
            "sha256": "${{ steps.sha.outputs.SHA256 }}",
            "notes": "تحديث جديد"
          }
          EOF
      
      - name: Commit version.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "🔥 Auto update to ${{ steps.version.outputs.VERSION }}" || echo "No changes"
          git push
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: KAMEL PRO v${{ steps.version.outputs.VERSION }}
          body: "تحديث أوتوماتيك"
          files: build/app/outputs/flutter-apk/app-release.apk
