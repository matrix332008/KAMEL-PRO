<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>KAMEL PRO</title>
<style>body{margin:0;background:#070a18;color:#fff;font-family:system-ui}header{background:linear-gradient(135deg,#4a4ed9,#7a3fe6);padding:14px;text-align:center}.logo{color:#ff3b3b;font-size:28px;font-weight:900}.card{background:#121526;margin:20px;border-radius:24px;padding:20px}input{width:100%;padding:14px;background:#0b0f20;border:2px solid #232842;border-radius:12px;color:#0ff;font-size:18px;text-align:center;letter-spacing:1px;margin:8px 0;box-sizing:border-box}.btn{width:100%;padding:15px;background:#ff3b3b;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;margin-top:12px;cursor:pointer}.qr{width:100%;padding:10px;background:#232842;border:1px dashed #3a4065;border-radius:10px;color:#8af;margin-top:12px;cursor:pointer}#v{width:100%;border-radius:12px;display:none;margin-top:10px}</style></head><body>
<header><div class="logo">KAMEL PRO</div></header>
<div class="card">
<h2 style="text-align:center;margin:0 0 10px">فعّل جهازك</h2>
<input id="mac" placeholder="F9:8C:E2:08:42:2B" maxlength="17">
<input id="key" placeholder="642306" maxlength="6">
<button class="btn" onclick="login()">تسجيل الدخول →</button>
<button class="qr" onclick="scan()">📷 امسح QR من التلفاز</button>
<video id="v" autoplay playsinline></video>
<p id="msg" style="text-align:center;margin-top:12px;opacity:.8"></p>
</div>
<script>
const S='https://jzusqopbxyltavjrxmuc.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6dXNxb3BieHlsdGF2anJ4bXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1NTMwMjAsImV4cCI6MjA2ODEyOTAyMH0.nW-0RJSdQg_GSHTlOJTP-9w-PRQfH5hgxq-hF_gQpGU';
const H={apikey:K,Authorization:'Bearer '+K};
async function login(){
 const m=document.getElementById('mac').value.trim().toUpperCase();
 const k=document.getElementById('key').value.trim();
 document.getElementById('msg').textContent='...';
 const r=await fetch(`${S}/rest/v1/devices?mac_address=eq.${encodeURIComponent(m)}&activation_key=eq.${encodeURIComponent(k)}&select=mac_address`,{headers:H});
 const d=await r.json();
 document.getElementById('msg').textContent=d.length?'✓ تم الدخول':'✗ المفتاح غالط';
}
async function scan(){
 const v=document.getElementById('v');v.style.display='block';
 try{
  const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  v.srcObject=s;
  const d='BarcodeDetector'in window?new BarcodeDetector({formats:['qr_code']}):null;
  const loop=async()=>{if(d){const c=await d.detect(v);if(c[0]){const t=c[0].rawValue.split('|');if(t.length>=3){document.getElementById('mac').value=t[1];document.getElementById('key').value=t[2];s.getTracks().forEach(x=>x.stop());v.style.display='none';login();return;}}}}requestAnimationFrame(loop);loop();
 }catch(e){alert('اسمح للكاميرا');}
}
</script></body></html>
