name: Auto Build & Release KAMEL PRO
on:
  push:
    branches: [ main ]
    paths:
      - 'pubspec.yaml'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      - name: Replace app icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          cp assets/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rm -f android/app/src/main/res/mipmap-*/ic_launcher_round.png
      - run: flutter pub get
      - id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | cut -d ' ' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$(echo $VERSION | cut -d '+' -f1)" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$(echo $VERSION | cut -d '+' -f2)" >> $GITHUB_OUTPUT
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/kamelpro-release.jks
      - name: Build APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release
      - id: sha
        run: echo "SHA256=$(sha256sum build/app/outputs/flutter-apk/app-release.apk | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
      - run: |
          cat > version.json << EOF
          {
            "versionCode": ${{ steps.version.outputs.VERSION_CODE }},
            "versionName": "${{ steps.version.outputs.VERSION_NAME }}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/app-release.apk",
            "sha256": "${{ steps.sha.outputs.SHA256 }}",
            "notes": "تحديث جديد"
          }
          EOF
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "🔥 Auto update" || true
          git push
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: KAMEL PRO v${{ steps.version.outputs.VERSION }}
          files: build/app/outputs/flutter-apk/app-release.apk
