<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAMEL PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--purple:#6c4df5;--dark:#0b0b1a;--card:#15152b;--red:#ff3b5c}
*{box-sizing:border-box}body{margin:0;background:var(--dark);color:#fff;font-family:system-ui}
.header{background:linear-gradient(135deg,#5a3df5,#8a5df5);padding:18px 16px 40px;display:flex;justify-content:space-between}
.logo{color:var(--red);font-weight:900;font-size:34px;line-height:.9}
.top-right{display:flex;gap:10px;align-items:center}
.lang{background:rgba(0,0,0,.25);border:none;color:#fff;padding:8px 14px;border-radius:20px}
.avatar{width:58px;height:58px;border-radius:50%;border:3px solid #fff;object-fit:cover}
.container{max-width:460px;margin:-28px auto 80px;background:var(--card);border-radius:28px;padding:26px 20px}
.input{width:100%;padding:16px;background:#0f0f1f;border:1px solid #2a2a4a;border-radius:14px;color:#fff;font-size:16px;margin:10px 0;text-align:right}
.input::placeholder{color:#8a8ab0}
.btn{width:100%;padding:16px;background:var(--red);border:none;border-radius:14px;color:#fff;font-weight:700;font-size:17px;margin-top:14px;cursor:pointer}
.btn-dl{background:#2a2a3f;display:flex;justify-content:space-between;align-items:center}
.qr-link{display:block;text-align:center;margin:14px 0;color:#7aa7ff;text-decoration:none}
#reader{width:100%;margin-top:10px;display:none}
.page{display:none}.page.active{display:block}
.item{background:#0f0f1f;padding:16px;border-radius:12px;margin:10px 0;display:flex;justify-content:space-between;align-items:center}
.whatsapp{position:fixed;bottom:20px;left:20px;background:#25D366;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;z-index:99}
</style>
</head>
<body>
<div class="header">
  <div><div class="logo">KAMEL<br>PRO</div><div style="font-size:14px;opacity:.9">إدارة اشتراكاتك</div></div>
  <div class="top-right">
    <select class="lang" onchange="setLang(this.value)"><option value="ar">عربي 🇹🇳</option><option value="fr">FR</option><option value="cs">CS</option><option value="en">EN</option></select>
    <img src="https://raw.githubusercontent.com/matrix332008/KAMEL-PRO/main/assets/avatar.png" class="avatar">
  </div>
</div>

<div class="container">
<div id="p1" class="page active">
  <h2 style="text-align:right">فعّل جهازك</h2>
  <input id="mac" class="input" placeholder="MAC: AA:BB:CC:DD:EE:FF">
  <input id="key" class="input" placeholder="ID: 123456">
  <button class="btn" onclick="login()">دخول →</button>
  <button class="btn btn-dl" onclick="window.open('https://www.mediafire.com/file/4j27apkiah1qd6e/Kamel_pro.apk/file')"><span>تحميل التطبيق</span><i class="fa-solid fa-download"></i></button>
  <a href="#" class="qr-link" onclick="startQR();return false">📷 امسح QR من التلفاز</a>
  <div id="reader"></div>
</div>

<div id="p2" class="page">
  <h2>قوائمي</h2><div id="macShow" style="opacity:.9;margin-bottom:14px;text-align:right;line-height:1.6"></div>
  <div class="item" onclick="f('m3u')"><div>📄 <b>إضافة M3U</b></div><span>+</span></div>
  <div class="item" onclick="f('xt')"><div>#️⃣ <b>إضافة Xtream</b></div><span>+</span></div>
  <div id="fm" style="display:none"><input id="mu" class="input" placeholder="http://...m3u"><button class="btn" onclick="sm()">حفظ</button></div>
  <div id="fx" style="display:none"><input id="xs" class="input" placeholder="Server"><input id="xu" class="input" placeholder="User"><input id="xp" class="input" placeholder="Pass" type="password"><button class="btn" onclick="sx()">حفظ</button></div>
  <div id="list"></div>
</div>
</div>

<a href="https://wa.me/420777099379" class="whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>

<script>
const supa = window.supabase.createClient(
  'https://pmgdzroirlegkpqzcyra.supabase.co',
  'sb_publishable_gkeT9X4EbhXj3Rb2HoKNag_pj7JpdFj'
);

let currentMac = '';
let html5Qr;

function setLang(l){}

async function login(){
  const macInput = document.getElementById('mac').value.replace('MAC:','').trim().toUpperCase();
  const key = document.getElementById('key').value.replace('ID:','').trim();
  if(!macInput ||!key) return alert('أدخل البيانات');

  let {data, error} = await supa.from('devices')
  .select('mac_address,activation_key,device_name,expiry_date')
  .eq('mac_address', macInput)
  .eq('activation_key', key)
  .maybeSingle();

  if(error ||!data){
    return alert('MAC أو ID غالط - شغّل التطبيق على التلفاز أولاً');
  }

  currentMac = macInput;
  await supa.from('devices').update({last_seen: new Date().toISOString()}).eq('mac_address', currentMac);

  document.getElementById('p1').classList.remove('active');
  document.getElementById('p2').classList.add('active');

  // ✅ يعرض الاسم والتاريخ
  const expDate = data.expiry_date? new Date(data.expiry_date).toLocaleDateString('ar-TN') : 'غير محدد';
  document.getElementById('macShow').innerHTML = `
    <div style="font-size:18px;font-weight:bold;color:#7aa7ff">${data.device_name || 'جهاز'}</div>
    <div style="font-size:14px;opacity:.8">${currentMac}</div>
    <div style="font-size:13px;color:#ffcc00;margin-top:4px">ينتهي: ${expDate}</div>
  `;

  load();
}

function f(t){
  document.getElementById('fm').style.display = t==='m3u'? 'block' : 'none';
  document.getElementById('fx').style.display = t==='xt'? 'block' : 'none';
}

// ✅ منع التكرار M3U
async function sm(){
  const url = document.getElementById('mu').value.trim();
  if(!url) return alert('أدخل الرابط');

  let {data:exists} = await supa.from('playlists')
  .select('id').eq('mac', currentMac).eq('type','m3u').eq('url', url).maybeSingle();

  if(exists) return alert('هذا الرابط موجود مسبقاً');

  await supa.from('playlists').insert({mac: currentMac, type:'m3u', url, name:'M3U'});
  document.getElementById('mu').value = '';
  alert('تم الحفظ ✓');
  load();
}

// ✅ منع التكرار Xtream
async function sx(){
  const server = document.getElementById('xs').value.trim();
  const user = document.getElementById('xu').value.trim();
  const pass = document.getElementById('xp').value;

  if(!server ||!user) return alert('أدخل البيانات');

  let {data:exists} = await supa.from('playlists')
  .select('id').eq('mac', currentMac).eq('type','xtream')
  .eq('server_url', server).eq('username', user).maybeSingle();

  if(exists){
    await supa.from('playlists').update({password: pass, created_at: new Date().toISOString()}).eq('id', exists.id);
    alert('تم تحديث الاشتراك ✓');
  } else {
    await supa.from('playlists').insert({
      mac: currentMac,
      type:'xtream',
      server_url: server,
      username: user,
      password: pass,
      name:'Xtream'
    });
    alert('تم الحفظ ✓');
  }
  load();
}

async function load(){
  const {data} = await supa.from('playlists').select().eq('mac', currentMac).order('created_at',{ascending:false});
  document.getElementById('list').innerHTML = (data||[]).map(p=>`
    <div class="item">
      <div>${p.type.toUpperCase()}<br><small style="opacity:.7">${p.url||p.server_url}</small></div>
      <button onclick="del(${p.id})" style="background:none;border:none;color:#ff5c5c;font-size:20px">🗑️</button>
    </div>`).join('');
}

async function del(id){
  if(confirm('حذف الاشتراك؟')){
    await supa.from('playlists').delete().eq('id',id);
    load();
  }
}

function startQR(){
  const reader = document.getElementById('reader');
  reader.style.display='block';
  html5Qr = new Html5Qrcode("reader");
  html5Qr.start({facingMode:"environment"},{fps:10,qrbox:250}, txt=>{
    html5Qr.stop();
    reader.style.display='none';
    try{
      const d = JSON.parse(txt);
      document.getElementById('mac').value = d.mac || '';
      document.getElementById('key').value = d.id || '';
      login();
    }catch(e){
      const p = txt.split('|');
      if(p.length >= 3){
        document.getElementById('mac').value = p[1];
        document.getElementById('key').value = p[2];
        login();
      }
    }
  }).catch(e=>alert('الكاميرا مرفوضة'));
}
</script>
</body>
</html>
